version: '3.8'

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: fmaputes_frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:4200:80"
    networks:
      - fmaputes_net
      - npm_network

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: fmaputes_backend
    restart: unless-stopped
    env_file: .env
    environment:
      - NODE_ENV=production
      - DB_HOST=database
      - DB_PORT=5432
      - PYTHON_SCRIPTS_PATH=/usr/src/app/scripts/python
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/health', r => { process.exit(r.statusCode === 200 ? 0 : 1) })"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    depends_on:
      - database
    networks:
      - fmaputes_net
      - npm_network

  database:
    image: postgres:15-alpine
    container_name: fmaputes_db
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - fmaputes_net

networks:
  fmaputes_net:
    name: fmaputes_internal_net
    driver: bridge
  npm_network:
    external: true
    name: backend_network

volumes:
  pgdata:
    name: fmaputes_pgdata